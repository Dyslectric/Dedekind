<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dedekind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
      html,body,#root{height:100%;margin:0;background:#24273a;}
      /* Vendored KaTeX math fonts (subset) for the live typeset math input:
         Math-Italic = greek + italic latin variables; Main-Regular = upright
         symbols/digits/parens; Size1/Size2 = large operators (∑ ∏ ∫ √). */
      @font-face{font-family:"KaTeX_Math";src:url("/katex-fonts/KaTeX_Math-Italic.woff2") format("woff2");font-style:italic;font-weight:normal;font-display:swap;}
      @font-face{font-family:"KaTeX_Main";src:url("/katex-fonts/KaTeX_Main-Regular.woff2") format("woff2");font-style:normal;font-weight:normal;font-display:swap;}
      @font-face{font-family:"KaTeX_Size1";src:url("/katex-fonts/KaTeX_Size1-Regular.woff2") format("woff2");font-style:normal;font-weight:normal;font-display:swap;}
      @font-face{font-family:"KaTeX_Size2";src:url("/katex-fonts/KaTeX_Size2-Regular.woff2") format("woff2");font-style:normal;font-weight:normal;font-display:swap;}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
